<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toxic Combination Terrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --bg:#070608;--text:#ecdfe6;--muted:#9a8794;
    --alarm:#39a0ff;--alarm2:#cfeeff;--bundle:#ffb347;--cold:#5f7d92;
    --panel:rgba(20,12,16,0.74);--line:rgba(200,140,160,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 800px at 72% -12%,#1a0c12 0%,var(--bg) 60%);
    color:var(--text);font-family:"IBM Plex Mono",monospace;overflow:hidden;}
  #canvas-wrap{position:fixed;inset:0}canvas{display:block}
  .hud{position:fixed;pointer-events:none}.hud *{pointer-events:auto}
  #head,#legend,#peaks,#panel{z-index:20}
  #head{top:0;left:0;right:0;padding:22px 26px 0}
  #head h1{font-family:"Syne",sans-serif;font-weight:800;font-size:25px;letter-spacing:-0.5px;line-height:1;text-transform:uppercase}
  #head h1 .dim{color:var(--muted);font-weight:600}
  #head .sub{color:var(--muted);font-size:12px;margin-top:7px;letter-spacing:.3px;max-width:640px}
  #head .sub b{color:var(--alarm2)}
  #legend{bottom:22px;right:26px;display:flex;gap:14px}
  #legend .bar{width:11px;border-radius:6px;
    background:linear-gradient(to top,#0c1018 0%,#1f2c40 20%,#4f7fc4 48%,#4f7fc4 52%,var(--alarm) 80%,var(--alarm2) 100%);
    box-shadow:0 0 0 1px rgba(255,255,255,.06) inset}
  #legend .labels{display:flex;flex-direction:column;justify-content:space-between;font-size:10.5px;color:var(--muted)}
  #legend .labels b{color:var(--text);font-weight:600;display:block}
  #panel{bottom:22px;left:26px;width:320px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:16px 17px;backdrop-filter:blur(9px)}
  #panel .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  #panel .lab{font-size:11px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
  #panel .val{font-size:13px;color:var(--alarm);font-weight:600}
  input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:3px;
    background:linear-gradient(to right,var(--cold),var(--alarm));outline:none;margin:4px 0 9px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
    background:var(--alarm2);cursor:pointer;box-shadow:0 0 8px rgba(57,160,255,.6)}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:var(--alarm2);cursor:pointer}
  #panel .note{font-size:10.5px;color:var(--muted);line-height:1.45}
  #panel .hint{font-size:10px;color:var(--muted);opacity:.7;margin-top:12px;border-top:1px solid var(--line);padding-top:9px}
  #peaks{top:22px;right:26px;width:248px;max-height:60vh;overflow:auto;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:13px 6px 13px 14px;backdrop-filter:blur(9px)}
  #peaks h2{font-size:10.5px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;user-select:none}
  #peaks h2::after{content:'\25BE';font-size:9px;opacity:.7}
  #peaks.collapsed{max-height:none}
  #peaks.collapsed h2{margin-bottom:0}
  #peaks.collapsed h2::after{content:'\25B8'}
  #peaks.collapsed #peaklist{display:none}
  .pk{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;font-size:11px;padding:5px 8px 5px 6px;border-radius:6px;cursor:pointer;transition:background .12s}
  .pk:hover{background:rgba(57,160,255,.14)}
  .pk .w{white-space:normal;word-break:break-word;line-height:1.32}
  .pk.x .w{color:var(--text)}.pk.b .w{color:var(--muted)}
  .pk .x{font-weight:600;flex:none}.pk.x .x{color:var(--alarm)}.pk.b .x{color:var(--bundle)}
  #tip{position:fixed;pointer-events:none;opacity:0;transform:translate(-50%,-118%);background:rgba(12,6,9,.96);
    border:1px solid rgba(57,160,255,.4);border-radius:9px;padding:9px 12px;font-size:12px;white-space:nowrap;
    transition:opacity .08s;z-index:30;box-shadow:0 8px 30px rgba(0,0,0,.6)}
  #tip .pair{font-weight:600;letter-spacing:.4px;font-size:12.5px}
  #tip .pair .conj{color:var(--muted);font-weight:400;margin:0 5px}
  #tip .det{color:var(--muted);font-size:11px;margin-top:4px}
  #tip .flag{margin-top:5px;font-size:11px;color:var(--alarm);font-weight:600}
  #tip .flag.ok{color:var(--bundle)}
  .axlabel{position:fixed;pointer-events:none;font-size:9px;color:var(--muted);transform:translate(-50%,-50%);
    white-space:nowrap;transition:color .12s,opacity .12s;will-change:transform;z-index:1}
  .axlabel.lit{color:#fff!important}
  #peaks::-webkit-scrollbar{width:7px}#peaks::-webkit-scrollbar-thumb{background:rgba(200,140,160,.2);border-radius:4px}
</style>
</head>

}
let THR=5;
function h(i,j){ if(i===j||!HAS[i][j]||SUP[i][j]<THR) return 0; return PMI[i][j]; }

function lerp(a,b,t){return a+(b-a)*t}
function mix(c1,c2,t){return [lerp(c1[0],c2[0],t),lerp(c1[1],c2[1],t),lerp(c1[2],c2[2],t)]}
const SEAC=[0.32,0.52,0.80],ALARM=[0.40,0.74,1.0],ALARM2=[0.82,0.96,1.0],
      BUND=[1,0.72,0.30],COLD=[0.14,0.20,0.32],COLD2=[0.04,0.06,0.12];
const VMAX=0.55,VMIN=0.7;
function colour(v,xdom){
  if(v>0){ const t=Math.min(v/VMAX,1);
    if(xdom) return t<0.6?mix(SEAC,ALARM,t/0.6):mix(ALARM,ALARM2,(t-0.6)/0.4);
    return mix(SEAC,BUND,t*0.7); }
  const t=Math.min(-v/VMIN,1); return t<0.6?mix(SEAC,COLD,t/0.6):mix(COLD,COLD2,(t-0.6)/0.4);
}

const wrap=document.getElementById('canvas-wrap');
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(0x070608,0.0042);
const camera=new THREE.PerspectiveCamera(46,innerWidth/innerHeight,0.1,2000);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
wrap.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xbb99aa,0.6));
const key=new THREE.DirectionalLight(0xfff0e8,0.9);key.position.set(50,120,40);scene.add(key);
const rim=new THREE.DirectionalLight(0xff5a78,0.45);rim.position.set(-70,40,-60);scene.add(rim);

// fine, subdivided grid -> smooth wireframe blanket
const SUB=3, FSEG=SEG*SUB;
const geo=new THREE.PlaneGeometry(SIZE,SIZE,FSEG,FSEG); geo.rotateX(-Math.PI/2);
const colAttr=new THREE.Float32BufferAttribute(new Float32Array(geo.attributes.position.count*3),3);
geo.setAttribute('color',colAttr);
// dark solid body: hides wireframe behind hills, and is the raycast target
const fill=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0x020306,side:THREE.DoubleSide,polygonOffset:true,polygonOffsetFactor:1.2,polygonOffsetUnits:1}));
scene.add(fill);
// glowing coloured wireframe sitting on top
const surface=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({vertexColors:true,wireframe:true,side:THREE.DoubleSide,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
scene.add(surface);
const mark=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,1,12),new THREE.MeshBasicMaterial({color:0xffd0c4,transparent:true,opacity:0.85}));
mark.visible=false;scene.add(mark);

const pos=geo.attributes.position;
const GX=new Float32Array(pos.count),GZ=new Float32Array(pos.count);
for(let k=0;k<pos.count;k++){GX[k]=(pos.getX(k)+HALF)/CELL;GZ[k]=(pos.getZ(k)+HALF)/CELL;}
const SH=Array.from({length:N},()=>new Float32Array(N));   // smoothed coarse height
const TMP=Array.from({length:N},()=>new Float32Array(N));
function smoothstep(t){return t<0?0:t>1?1:t*t*(3-2*t);}
function blurField(){                                       // round the spikes (two smoothing passes)
  for(let i=0;i<N;i++)for(let j=0;j<N;j++) SH[i][j]=h(i,j);
  for(let p=0;p<2;p++){
    for(let i=0;i<N;i++)for(let j=0;j<N;j++){
      let s=0.5*SH[i][j];
      s+=0.125*SH[i>0?i-1:i][j]; s+=0.125*SH[i<N-1?i+1:i][j];
      s+=0.125*SH[i][j>0?j-1:j]; s+=0.125*SH[i][j<N-1?j+1:j];
      TMP[i][j]=s;
    }
    for(let i=0;i<N;i++) SH[i].set(TMP[i]);
  }
}
function sampleH(gx,gz){                                     // smooth interpolation onto the fine grid
  let i0=Math.max(0,Math.min(N-2,Math.floor(gx))), j0=Math.max(0,Math.min(N-2,Math.floor(gz)));
  const tx=smoothstep(gx-i0), tz=smoothstep(gz-j0);
  const a=SH[i0][j0],b=SH[i0+1][j0],c=SH[i0][j0+1],d=SH[i0+1][j0+1];
  return (a*(1-tx)+b*tx)*(1-tz)+(c*(1-tx)+d*tx)*tz;
}
function rebuild(){
  blurField();
  for(let k=0;k<pos.count;k++){
    const v=sampleH(GX[k],GZ[k]);
    pos.setY(k,v*HSCALE);
    const ci=Math.max(0,Math.min(N-1,Math.round(GX[k]))), cj=Math.max(0,Math.min(N-1,Math.round(GZ[k])));
    const col=colour(v,XD[ci][cj]); colAttr.setXYZ(k,col[0],col[1],col[2]);
  }
  pos.needsUpdate=true;colAttr.needsUpdate=true;
}
rebuild();

let theta=-0.7,phi=0.92,radius=185;const target=new THREE.Vector3(0,3,0);
{const _a=innerWidth/innerHeight; if(_a<1.1) radius=Math.min(360,185/Math.max(_a,0.4)*0.72);}
function applyCam(){camera.position.set(target.x+radius*Math.sin(phi)*Math.cos(theta),target.y+radius*Math.cos(phi),target.z+radius*Math.sin(phi)*Math.sin(theta));camera.lookAt(target);}
applyCam();
let drag=false,px=0,py=0;const el=renderer.domElement;
el.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;el.setPointerCapture(e.pointerId);});
el.addEventListener('pointerup',()=>drag=false);
el.addEventListener('pointermove',e=>{if(drag){theta+=(e.clientX-px)*0.005;phi-=(e.clientY-py)*0.005;phi=Math.max(0.18,Math.min(2.4,phi));px=e.clientX;py=e.clientY;applyCam();}hover(e);});
el.addEventListener('wheel',e=>{e.preventDefault();radius=Math.max(90,Math.min(420,radius+e.deltaY*0.18));applyCam();},{passive:false});

const ray=new THREE.Raycaster(),m=new THREE.Vector2(),tip=document.getElementById('tip');
function hover(e){
  if(drag){tip.style.opacity=0;return;}
  m.x=(e.clientX/innerWidth)*2-1;m.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(m,camera);
  const hit=ray.intersectObject(fill)[0];
  if(!hit){tip.style.opacity=0;mark.visible=false;return;}
  const i=Math.max(0,Math.min(N-1,Math.round((hit.point.x+HALF)/CELL)));
  const j=Math.max(0,Math.min(N-1,Math.round((hit.point.z+HALF)/CELL)));
  showTip(i,j,e.clientX,e.clientY);
}
function showTip(i,j,sx,sy){
  if(i===j||!HAS[i][j]){tip.style.opacity=0;return;}
  const c=INFO[i+','+j];
  tip.querySelector('.pair').innerHTML=`${WORDS[i]}<span class="conj">+</span>${WORDS[j]}`;
  tip.querySelector('.det').textContent=`${c.o} users hold both · ×${c.lift} vs role norm`;
  const f=tip.querySelector('.flag');
  if(SUP[i][j]<THR){f.className='flag ok';f.textContent='below evidence floor';}
  else if(c.xdom){f.className='flag';f.textContent=`⚠ ${DOMS[i]} × ${DOMS[j]} — candidate duty conflict`;}
  else{f.className='flag ok';f.textContent=`${DOMS[i]} role bundle — expected`;}
  tip.style.left=sx+'px';tip.style.top=sy+'px';tip.style.opacity=1;lightAxes(i,j);
}

function mkLabel(w,i){const d=document.createElement('div');d.className='axlabel';d.textContent=w;d.dataset.dc=DOMC[DOMS[i]];document.body.appendChild(d);return d;}
const labI=WORDS.map(mkLabel),labJ=WORDS.map(mkLabel);
labI.forEach((d,i)=>d.style.color=DOMC[DOMS[i]]);labJ.forEach((d,i)=>d.style.color=DOMC[DOMS[i]]);
const tmp=new THREE.Vector3();
function project(x,y,z){tmp.set(x,y,z).project(camera);return {x:(tmp.x*0.5+0.5)*innerWidth,y:(-tmp.y*0.5+0.5)*innerHeight,vis:tmp.z<1};}
const HUDEL=['head','legend','peaks','panel'].map(id=>document.getElementById(id));
function occluded(x,y){for(const e of HUDEL){const r=e.getBoundingClientRect();if(x>=r.left-2&&x<=r.right+2&&y>=r.top-2&&y<=r.bottom+2)return true;}return false;}
function placeLabels(){
  let lpx=-1e9,lpy=-1e9,lqx=-1e9,lqy=-1e9; const GAP=12;
  for(let i=0;i<N;i++){
    const p=project(-HALF+i*CELL,-1,-HALF-4);
    const pv=p.vis&&!occluded(p.x,p.y)&&(Math.abs(p.x-lpx)>GAP||Math.abs(p.y-lpy)>GAP);
    labI[i].style.left=p.x+'px';labI[i].style.top=p.y+'px';labI[i].style.opacity=pv?1:0;
    if(pv){lpx=p.x;lpy=p.y;}
    const q=project(-HALF-4,-1,-HALF+i*CELL);
    const qv=q.vis&&!occluded(q.x,q.y)&&(Math.abs(q.x-lqx)>GAP||Math.abs(q.y-lqy)>GAP);
    labJ[i].style.left=q.x+'px';labJ[i].style.top=q.y+'px';labJ[i].style.opacity=qv?1:0;
    if(qv){lqx=q.x;lqy=q.y;}
  }
}
let litI=-1,litJ=-1;
function lightAxes(i,j){if(litI>=0){labI[litI].classList.remove('lit');labJ[litJ].classList.remove('lit');}labI[i].classList.add('lit');labJ[j].classList.add('lit');litI=i;litJ=j;}

const list=document.getElementById('peaklist');
function renderPeaks(){
  list.innerHTML='';
  DATA.topPeaks.filter(c=>c.o>=THR).slice(0,16).forEach(c=>{
    const row=document.createElement('div');row.className='pk '+(c.xdom?'x':'b');
    row.innerHTML=`<span class="w">${c.a} + ${c.b}</span><span class="x">×${c.lift}</span>`;
    row.onmouseenter=()=>{markAt(c.ai,c.bi);lightAxes(c.ai,c.bi);};
    row.onclick=()=>{target.set(-HALF+c.ai*CELL,3,-HALF+c.bi*CELL);markAt(c.ai,c.bi);applyCam();};
    list.appendChild(row);
  });
}
function markAt(i,j){const v=SH[i][j];if(v<=0){mark.visible=false;return;}
  mark.material.color.set(XD[i][j]?0x4fb8ff:0xffb347);
  mark.position.set(-HALF+i*CELL,(v*HSCALE)/2,-HALF+j*CELL);mark.scale.y=v*HSCALE;mark.visible=true;}

const thr=document.getElementById('thr'),thrval=document.getElementById('thrval'),thrnote=document.getElementById('thrnote');
function updateNote(){const kept=DATA.cells.filter(c=>c.o>=THR&&c.xdom&&c.pmi>0).length;
  thrnote.textContent=`${kept} cross-domain pairs clear the bar. Raise it to dismiss conflicts built on too few users; lower it to let coincidence back in.`;}
thr.addEventListener('input',()=>{THR=+thr.value;thrval.textContent='≥ '+THR+' users';rebuild();renderPeaks();updateNote();mark.visible=false;});
renderPeaks();updateNote();

document.querySelector('#peaks h2').addEventListener('click',()=>document.getElementById('peaks').classList.toggle('collapsed'));

function loop(){placeLabels();renderer.render(scene,camera);requestAnimationFrame(loop);}
loop();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
